# =============================================================================
# GEO Platform — Docker Compose Override (Development Environment)
# =============================================================================
# This file is automatically loaded by `docker compose` when present alongside
# docker-compose.yml. It adds source-code volume mounts and debug ports for
# local development convenience.
# =============================================================================

services:
  postgres:
    ports:
      - "5432:5432"
    # Expose raw Postgres for local GUI tools (pgAdmin, DBeaver, etc.)

  redis:
    ports:
      - "6379:6379"
    # Expose raw Redis for local GUI tools (RedisInsight, etc.)

  geoflow:
    volumes:
      - ../geoflow-engine:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/storage
      - /var/www/html/bootstrap/cache
    environment:
      PHP_IDE_CONFIG: serverName=geoflow-docker
      XDEBUG_MODE: "${XDEBUG_MODE:-off}"
      XDEBUG_CONFIG: "client_host=host.docker.internal"
    ports:
      - "9003:9003"  # Xdebug

  management:
    volumes:
      - ../management-layer:/app
      - /app/node_modules
      - /app/dist
    environment:
      NODE_ENV: development
    ports:
      - "9229:9229"  # Node.js inspector
      - "3001:3001"  # Direct access (bypass nginx)

  frontend:
    volumes:
      - ../frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://nginx:8080
    ports:
      - "9230:9229"  # Node.js inspector (Next.js)
      - "3000:3000"  # Direct access (bypass nginx)

  nginx:
    ports:
      - "8080:80"
