# =============================================================================
# GEO Platform — Nginx Reverse Proxy Configuration (T02)
# =============================================================================
# Routing rules:
#   /api/v1/  →  management:3001  (Node.js management layer, HTTP proxy)
#   /api/     →  geoflow:9000     (PHP-FPM / GEOFlow Laravel, FastCGI)
#   /         →  frontend:3000    (Next.js frontend, HTTP proxy)
# =============================================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50m;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml application/xml+rss text/javascript;

    # WebSocket connection upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # -------------------------------------------------------------------------
    # Upstream: Management Layer (Node.js / Fastify)
    # -------------------------------------------------------------------------
    upstream management_upstream {
        server management:3001;
        keepalive 32;
    }

    # -------------------------------------------------------------------------
    # Upstream: GEOFlow (PHP-FPM — FastCGI)
    # -------------------------------------------------------------------------
    upstream geoflow_upstream {
        server geoflow:9000;
        keepalive 32;
    }

    # -------------------------------------------------------------------------
    # Upstream: Frontend (Next.js)
    # -------------------------------------------------------------------------
    upstream frontend_upstream {
        server frontend:3000;
        keepalive 32;
    }

    # -------------------------------------------------------------------------
    # Main Server Block
    # -------------------------------------------------------------------------
    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # -------------------------------------------------------------------
        # Route: /api/v1/  →  Management Layer (Node.js / Fastify)
        # -------------------------------------------------------------------
        location /api/v1/ {
            proxy_pass http://management_upstream;
            proxy_http_version 1.1;

            # Proxy headers
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;

            # WebSocket support (for future real-time features)
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # -------------------------------------------------------------------
        # Route: /api/  →  GEOFlow (PHP-FPM via FastCGI)
        # Passes requests to Laravel's public/index.php front controller.
        # Requests matching /api/ but NOT /api/v1/ are handled here.
        # -------------------------------------------------------------------
        location /api/ {
            # FastCGI pass to PHP-FPM
            fastcgi_pass geoflow_upstream;

            # Standard FastCGI parameters
            include       fastcgi_params;

            # Laravel front controller
            fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;

            # Pass the original request URI so Laravel can route correctly.
            # Laravel's api.php routes are auto-prefixed with /api/.
            fastcgi_param REQUEST_URI     $request_uri;

            # Document root for Laravel's public directory
            fastcgi_param DOCUMENT_ROOT   /var/www/html/public;

            # Proxy headers — forwarded to PHP-FPM for Laravel's Request::ip() etc.
            fastcgi_param HTTP_HOST             $host;
            fastcgi_param HTTP_X_REAL_IP        $remote_addr;
            fastcgi_param HTTP_X_FORWARDED_FOR  $proxy_add_x_forwarded_for;
            fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;

            # Required for Laravel's Response::isSecure() and URL generation
            fastcgi_param HTTPS $https if_not_empty;

            # FastCGI timeouts (generous for AI content generation)
            fastcgi_connect_timeout 30s;
            fastcgi_send_timeout    120s;
            fastcgi_read_timeout    120s;

            # Buffer settings for larger API responses
            fastcgi_buffer_size 32k;
            fastcgi_buffers      8 32k;
            fastcgi_busy_buffers_size 64k;
        }

        # -------------------------------------------------------------------
        # Route: /  →  Frontend (Next.js)
        # -------------------------------------------------------------------
        location / {
            proxy_pass http://frontend_upstream;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;

            # WebSocket support (Next.js HMR in dev, real-time in prod)
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_connect_timeout 30s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }
    }
}
