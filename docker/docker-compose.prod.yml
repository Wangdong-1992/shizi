# =============================================================================
# GEO Platform — Docker Compose (生产环境)
# =============================================================================
# 用途: 部署到云服务器（阿里云/腾讯云/AWS等）
# 端口: 80/443 (HTTP/HTTPS)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 + pgvector
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: geo-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-geo_platform}
      POSTGRES_USER: ${POSTGRES_USER:-geo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"  # 仅本地访问
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - geo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-geo} -d ${POSTGRES_DB:-geo_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis 7
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: geo-redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"  # 仅本地访问
    volumes:
      - redisdata:/data
    networks:
      - geo-network
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # GEOFlow — PHP 8.3-FPM + Laravel 12
  # ---------------------------------------------------------------------------
  geoflow:
    build:
      context: ..
      dockerfile: docker/geoflow/Dockerfile
    container_name: geo-geoflow
    restart: always
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: ${POSTGRES_HOST:-postgres}
      DB_PORT: ${POSTGRES_PORT:-5432}
      DB_DATABASE: ${POSTGRES_DB:-geo_platform}
      DB_USERNAME: ${POSTGRES_USER:-geo}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: geo-management
      APP_ENV: production
      APP_DEBUG: "false"
      LOG_CHANNEL: daily
      SESSION_DRIVER: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - geo-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # Management Layer — Node.js + Fastify
  # ---------------------------------------------------------------------------
  management:
    build:
      context: ..
      dockerfile: docker/management/Dockerfile
    container_name: geo-management
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-geo}:${POSTGRES_PASSWORD}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-geo_platform}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      JWT_ISSUER: geo-management
      GEOFLOW_API_URL: http://nginx/api
      PORT: 3001
      HOST: 0.0.0.0
      LOG_LEVEL: ${LOG_LEVEL:-warn}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - geo-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # Frontend — Next.js 15
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile
    container_name: geo-frontend
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost}
    depends_on:
      - management
    networks:
      - geo-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # Nginx — 反向代理 (HTTPS终止)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: geo-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - geoflow
      - management
      - frontend
    networks:
      - geo-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

# =============================================================================
# Networks
# =============================================================================
networks:
  geo-network:
    driver: bridge
    name: geo-network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  pgdata:
    name: geo-pgdata
  redisdata:
    name: geo-redisdata
